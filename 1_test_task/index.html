<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дом</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #90EE90 70%, #90EE90 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 80px;
    }

    .house {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chimney {
      position: absolute;
      width: 40px;
      height: 160px;
      background-color: #8B4513;
      top: -60px;
      right: 80px;
      z-index: 10;
      border-top: 4px solid #6B3410;
    }

    .roof {
      width: 0;
      height: 0;
      border-left: 200px solid transparent;
      border-right: 200px solid transparent;
      border-bottom: 150px solid #C0392B;
      position: relative;
      z-index: 15;
    }

    .base {
      width: 320px;
      height: 220px;
      background-color: #F5DEB3;
      position: relative;
      border: 3px solid #D2B48C;
      z-index: 5;
    }

    .window {
      position: absolute;
      width: 70px;
      height: 70px;
      background-color: #ADD8E6;
      border-radius: 50%;
      border: 5px solid #8B6914;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
    }

    .window::after {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      top: 8px;
      left: 10px;
    }

    .door {
      position: absolute;
      width: 60px;
      height: 100px;
      background-color: #8B4513;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 30px 30px 0 0;
      border: 3px solid #6B3410;
    }

    .door::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #FFD700;
      border-radius: 50%;
      top: 55px;
      right: 10px;
    }

    .window-frame {
      position: absolute;
      width: 90px;
      height: 90px;
      border: 4px solid #8B6914;
      border-radius: 50%;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .foundation {
      width: 340px;
      height: 16px;
      background-color: #A9A9A9;
      border: 2px solid #808080;
    }
  </style>
</head>
<body>
  <div class="house">
    <div class="chimney"></div>
    <div class="roof"></div>
    <div class="base">
      <div class="window-frame"></div>
      <div class="window"></div>
      <div class="door"></div>
    </div>
    <div class="foundation"></div>
  </div>
</body>
</html>
